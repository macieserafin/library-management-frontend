<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Library Spring Tester</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>Library Spring Tester</h1>
        <p>Prosty panel do sprawdzania endpointow backendu.</p>
      </div>
      <form class="api-form" id="api-form">
        <label for="api-url">API</label>
        <input id="api-url" name="api-url" type="url" value="http://localhost:8080" required>
        <button type="submit">Polacz</button>
      </form>
    </header>

    <section class="status-row" aria-live="polite">
      <div class="status-pill" id="connection-status">Nie sprawdzono polaczenia</div>
      <button id="refresh-all" type="button">Odswiez dane</button>
    </section>

    <section class="grid">
      <article class="panel">
        <div class="panel-head">
          <h2>Biblioteki</h2>
          <button type="button" data-refresh="libraries">Odswiez</button>
        </div>
        <form id="library-form" class="entity-form">
          <input type="hidden" name="id">
          <label>
            Nazwa
            <input name="name" placeholder="Biblioteka Glowna" required>
          </label>
          <div class="actions">
            <button type="submit">Zapisz</button>
            <button type="button" data-reset-form="library-form">Wyczysc</button>
          </div>
        </form>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>ID</th><th>Nazwa</th><th>Akcje</th></tr>
            </thead>
            <tbody id="libraries-list"></tbody>
          </table>
        </div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <h2>Ksiazki</h2>
          <button type="button" data-refresh="books">Odswiez</button>
        </div>
        <form id="book-form" class="entity-form">
          <input type="hidden" name="id">
          <div class="two-col">
            <label>
              Tytul
              <input name="title" placeholder="Clean Code" required>
            </label>
            <label>
              Autor
              <input name="author" placeholder="Robert C. Martin" required>
            </label>
          </div>
          <div class="two-col">
            <label>
              Rok
              <input name="year" type="number" min="0" max="3000" placeholder="2008" required>
            </label>
            <label>
              Biblioteka
              <select name="libraryId" required></select>
            </label>
          </div>
          <div class="actions">
            <button type="submit">Zapisz</button>
            <button type="button" data-reset-form="book-form">Wyczysc</button>
          </div>
        </form>
        <form id="book-filter-form" class="filter-form">
          <input name="title" placeholder="Filtr tytulu">
          <input name="author" placeholder="Filtr autora">
          <input name="year" type="number" min="0" max="3000" placeholder="Rok">
          <button type="submit">Filtruj</button>
          <button type="button" id="clear-book-filter">Reset</button>
        </form>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>ID</th><th>Tytul</th><th>Autor</th><th>Rok</th><th>Biblioteka</th><th>Akcje</th></tr>
            </thead>
            <tbody id="books-list"></tbody>
          </table>
        </div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <h2>Uzytkownicy</h2>
          <button type="button" data-refresh="users">Odswiez</button>
        </div>
        <form id="user-form" class="entity-form">
          <input type="hidden" name="id">
          <label>
            Imie i nazwisko
            <input name="name" placeholder="Anna Kowalska" required>
          </label>
          <label>
            Email
            <input name="email" type="email" placeholder="anna@example.com" required>
          </label>
          <label>
            Typ
            <select name="userType" required>
              <option value="STUDENT">STUDENT</option>
              <option value="TEACHER">TEACHER</option>
            </select>
          </label>
          <div class="actions">
            <button type="submit">Zapisz</button>
            <button type="button" data-reset-form="user-form">Wyczysc</button>
          </div>
        </form>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>ID</th><th>Nazwa</th><th>Email</th><th>Typ</th><th>Akcje</th></tr>
            </thead>
            <tbody id="users-list"></tbody>
          </table>
        </div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <h2>Wypozyczenia</h2>
          <button type="button" data-refresh="borrows">Odswiez</button>
        </div>
        <form id="borrow-form" class="entity-form">
          <label>
            Uzytkownik
            <select name="userId" required></select>
          </label>
          <label>
            Ksiazka
            <select name="bookId" required></select>
          </label>
          <div class="actions">
            <button type="submit">Wypozycz</button>
          </div>
        </form>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>ID</th><th>Uzytkownik</th><th>Ksiazka</th><th>Od</th><th>Zwrot</th><th>Akcje</th></tr>
            </thead>
            <tbody id="borrows-list"></tbody>
          </table>
        </div>
      </article>
    </section>

    <section class="log-panel">
      <div class="panel-head">
        <h2>Log</h2>
        <button type="button" id="clear-log">Wyczysc log</button>
      </div>
      <pre id="log"></pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
